name: Verify deploy token

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  verify-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce token parity (token.txt + index.html)
        run: ./scripts/verify-token.sh
