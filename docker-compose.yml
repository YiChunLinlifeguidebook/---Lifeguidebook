# 複製 .env.example 為 .env 並填入 LINE 憑證後再啟動 bot。

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    env_file: .env
    ports:
      - "3000:3000"
    restart: unless-stopped
